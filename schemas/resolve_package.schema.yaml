# resolve_package.schema.yaml
# Schema for the DaVinci Resolve package JSON.
# Version: 1.0
#
# The resolve package is generated by the `prepare-resolve` pipeline stage.
# File location: output/davinci/<episode_id>.resolve_package.json
#
# It provides all the metadata needed for semi-automatic Resolve assembly:
# timeline items, bin structure, media relink map, audio/subtitle paths.

schema_version: "1.0"

type: object
required: [schema_version, episode_id, timeline_items, bins, relink_map]

properties:
  schema_version:
    type: string
    const: "1.0"

  episode_id:
    type: string

  bins:
    type: array
    description: >
      Suggested Media Pool bin names (one per scene).
      Format: "Episode <id> / <scene_code>"
    items:
      type: string

  relink_map:
    type: object
    description: >
      Map of shot_slug → absolute image path.
      Use this to relink media in DaVinci if paths change between sessions.
    additionalProperties:
      type: string

  timeline_items:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - index
        - scene_code
        - shot_code
        - scene_title
        - duration_seconds
        - timeline_track
        - transition_in
        - transition_out
      properties:
        index:
          type: integer
          minimum: 1
          description: Global 1-based position in the timeline

        scene_code:
          type: string
          description: e.g. "ESCENA 01"

        shot_code:
          type: string
          description: e.g. "ESCENA 01 - PLANO 01"

        scene_title:
          type: string

        duration_seconds:
          type: number
          minimum: 0.5

        timeline_track:
          type: string
          description: >
            Resolve video track name.  "V1" for main video,
            "V2" for overlays, etc.

        transition_in:
          type: string
          enum: [cut, dissolve, fade, wipe]

        transition_out:
          type: string
          enum: [cut, dissolve, fade, wipe]

        image_path:
          type: [string, "null"]
          description: Path to the selected still image for this shot

        audio_paths:
          type: array
          items:
            type: string
          description: >
            Ordered list of WAV paths for dialogue or music on this shot.
            First path maps to A1, second to A2, etc.

        subtitle_path:
          type: [string, "null"]
          description: >
            Path to the SRT subtitle file for this shot (if generated).

        marker_label:
          type: [string, "null"]
          description: >
            Text for a DaVinci timeline marker at the clip's in-point.
            Format: "<scene_code> | <shot_code>"

        notes:
          type: string
          description: Human-readable shot description / editorial notes
