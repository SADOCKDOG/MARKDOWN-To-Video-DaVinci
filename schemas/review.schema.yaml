# review.schema.yaml
# Schema for the human review manifest.
# Version: 1.0
#
# The review manifest is generated by the `review-pack` pipeline stage.
# File location: output/review/<episode_id>.review.json
#
# A human editor (or QC automation) fills in the per-shot status fields.
# The `assert_ready_to_render` gate refuses to proceed unless every shot
# is marked "approved" and no missing_assets remain.

schema_version: "1.0"

type: object
required: [schema_version, episode_id, overall_status, render_intent, shots]

properties:
  schema_version:
    type: string
    const: "1.0"

  episode_id:
    type: string

  overall_status:
    type: string
    enum: [pending, approved, needs_revision, rejected]
    description: >
      Computed summary of all shot statuses.
      "approved" only when every shot is individually approved.

  render_intent:
    type: object
    description: Target render format and platform export settings
    required: [format, resolution, framerate, codec, platform, loudness_lufs]
    properties:
      format:
        type: string
        examples: [mp4, mov]
      resolution:
        type: string
        examples: ["1920x1080", "3840x2160"]
      framerate:
        type: number
        examples: [24.0, 25.0, 30.0]
      codec:
        type: string
        examples: [h264, h265, prores]
      platform:
        type: string
        examples: [youtube, vimeo, broadcast]
      loudness_lufs:
        type: number
        description: Target integrated loudness (LUFS, e.g. -14 for YouTube)

  shots:
    type: array
    items:
      type: object
      required: [shot_code, scene_code, status]
      properties:
        shot_code:
          type: string

        scene_code:
          type: string

        status:
          type: string
          enum: [pending, approved, needs_revision, rejected]

        continuity_ok:
          type: [boolean, "null"]
          description: >
            True if the shot maintains visual continuity with adjacent shots
            (color, wardrobe, prop placement, lighting direction).

        lipsync_ok:
          type: [boolean, "null"]
          description: >
            True if dialogue audio is acceptably in sync with character movement.
            Set null when the shot has no dialogue.

        subtitle_ok:
          type: [boolean, "null"]
          description: >
            True if subtitle timing, spelling and formatting are acceptable.
            Set null when no subtitles are present.

        loudness_ok:
          type: [boolean, "null"]
          description: >
            True if the shot's audio loudness is within the target range
            defined in render_intent.loudness_lufs ± 1 LU.

        missing_assets:
          type: array
          items:
            type: string
          description: >
            Paths of expected asset files that do not yet exist on disk.
            Auto-populated by `review-pack`; a human must clear this list
            before the shot can be approved.

        notes:
          type: string
          description: Free-text editorial notes for the shot reviewer
