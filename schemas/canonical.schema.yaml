# canonical.schema.yaml
# Schema for the canonical episode JSON manifest.
# Version: 1.0
#
# The canonical JSON is generated by the `breakdown` pipeline stage from
# the technical YAML.  It is the authoritative normalized representation
# consumed by all downstream stages (assets, resolve_prep, review).
#
# File location: output/manifests/<episode_id>.canonical.json
#
# This schema mirrors the CanonicalEpisode dataclass
# (markdown_to_video_davinci/models/canonical.py).

schema_version: "1.0"

type: object
required: [schema_version, episode_id, title, quality_prompt, characters, scenes]

properties:
  schema_version:
    type: string
    const: "1.0"

  episode_id:
    type: string
    description: Slug identifier, e.g. "ep01"

  title:
    type: string
    description: Human-readable episode title

  quality_prompt:
    type: string
    description: Global visual quality baseline appended to every image prompt

  characters:
    type: object
    description: Map of character slug → {name, prompt}
    additionalProperties:
      type: object
      required: [name, prompt]
      properties:
        name:
          type: string
        prompt:
          type: string

  scenes:
    type: array
    minItems: 1
    items:
      type: object
      required: [code, title, visual_summary, visual_prompt, characters, shots]
      properties:
        code:
          type: string
          description: e.g. "ESCENA 01"
        title:
          type: string
        visual_summary:
          type: string
        visual_prompt:
          type: string
        characters:
          type: array
          items:
            type: string
        shots:
          type: array
          minItems: 1
          items:
            type: object
            required: [index, code, description, visual_prompt, timing, characters, dialogue, resources]
            properties:
              index:
                type: integer
                minimum: 1
              code:
                type: string
              description:
                type: string
              visual_prompt:
                type: string
              timing:
                type: object
                required: [duration_seconds, transition_in, transition_out, timeline_track]
                properties:
                  duration_seconds:
                    type: number
                  transition_in:
                    type: string
                  transition_out:
                    type: string
                  timeline_track:
                    type: string
              characters:
                type: array
                items:
                  type: string
              dialogue:
                type: array
                items:
                  type: object
                  required: [character, text, timing_offset_seconds, state]
                  properties:
                    character:
                      type: string
                    text:
                      type: string
                    timing_offset_seconds:
                      type: number
                    voice_path:
                      type: [string, "null"]
                    state:
                      type: string
                      enum: [planned, generated, selected, rejected, approved]
              resources:
                type: array
                items:
                  type: object
                  required: [kind, slug, state]
                  properties:
                    kind:
                      type: string
                      enum: [image, audio, clip]
                    slug:
                      type: string
                    prompt:
                      type: [string, "null"]
                    path:
                      type: [string, "null"]
                    state:
                      type: string
                      enum: [planned, generated, selected, rejected, approved]
